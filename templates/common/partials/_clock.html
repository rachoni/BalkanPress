<div class="digital-clock text-center">
    <span id="clock" class="fw-bold fs-5"></span>
</div>

<script>
    function updateClock() {
        const clockElement = document.getElementById('clock');
        if (!clockElement) {
            return;
        }

        const now = new Date();
        const options = {
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        };

        clockElement.textContent = now.toLocaleTimeString('en-GB', options);
    }

    setInterval(updateClock, 1000);
    updateClock();
</script>
