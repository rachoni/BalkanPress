<div class="card shadow-sm">
    <div class="card-body">
        <h3 class="h6 mb-2">Weather (Bulgaria)</h3>
        <p id="weather-city" class="mb-1 fw-semibold small">Loading city...</p>
        <p class="mb-1 text-muted small">
            <span id="weather-icon-current" class="me-1" aria-hidden="true">⏳</span>
            <span id="weather-current">Loading current weather...</span>
        </p>
        <p class="mb-0 text-muted small">
            <span id="weather-icon-tomorrow" class="me-1" aria-hidden="true">⏳</span>
            <span id="weather-tomorrow">Loading forecast...</span>
        </p>
    </div>
</div>

<script>
    (function () {
        const cityElement = document.getElementById('weather-city');
        const currentIconElement = document.getElementById('weather-icon-current');
        const tomorrowIconElement = document.getElementById('weather-icon-tomorrow');
        const currentElement = document.getElementById('weather-current');
        const tomorrowElement = document.getElementById('weather-tomorrow');

        if (!cityElement || !currentIconElement || !tomorrowIconElement || !currentElement || !tomorrowElement) {
            return;
        }

        const cities = [
            { name: 'Blagoevgrad', lat: 42.0209, lon: 23.0943 },
            { name: 'Burgas', lat: 42.5048, lon: 27.4626 },
            { name: 'Varna', lat: 43.2141, lon: 27.9147 },
            { name: 'Veliko Tarnovo', lat: 43.0757, lon: 25.6172 },
            { name: 'Vidin', lat: 43.9962, lon: 22.8679 },
            { name: 'Vratsa', lat: 43.2102, lon: 23.5625 },
            { name: 'Gabrovo', lat: 42.8747, lon: 25.3342 },
            { name: 'Dobrich', lat: 43.5726, lon: 27.8273 },
            { name: 'Kardzhali', lat: 41.6500, lon: 25.3667 },
            { name: 'Kyustendil', lat: 42.2839, lon: 22.6911 },
            { name: 'Lovech', lat: 43.1368, lon: 24.7140 },
            { name: 'Montana', lat: 43.4125, lon: 23.2250 },
            { name: 'Pazardzhik', lat: 42.1928, lon: 24.3336 },
            { name: 'Pernik', lat: 42.6031, lon: 23.0378 },
            { name: 'Pleven', lat: 43.4170, lon: 24.6067 },
            { name: 'Plovdiv', lat: 42.1354, lon: 24.7453 },
            { name: 'Razgrad', lat: 43.5333, lon: 26.5167 },
            { name: 'Ruse', lat: 43.8356, lon: 25.9657 },
            { name: 'Silistra', lat: 44.1147, lon: 27.2671 },
            { name: 'Sliven', lat: 42.6817, lon: 26.3229 },
            { name: 'Smolyan', lat: 41.5774, lon: 24.7012 },
            { name: 'Sofia (Province)', lat: 42.6977, lon: 23.3219 },
            { name: 'Sofia (City)', lat: 42.6977, lon: 23.3219 },
            { name: 'Stara Zagora', lat: 42.4258, lon: 25.6345 },
            { name: 'Targovishte', lat: 43.2512, lon: 26.5721 },
            { name: 'Haskovo', lat: 41.9342, lon: 25.5556 },
            { name: 'Shumen', lat: 43.2706, lon: 26.9229 },
            { name: 'Yambol', lat: 42.4833, lon: 26.5000 }
        ];

        const weatherCodes = {
            0: 'Clear sky',
            1: 'Mainly clear',
            2: 'Partly cloudy',
            3: 'Overcast',
            45: 'Fog',
            48: 'Rime fog',
            51: 'Light drizzle',
            53: 'Drizzle',
            55: 'Dense drizzle',
            56: 'Freezing drizzle',
            57: 'Dense freezing drizzle',
            61: 'Slight rain',
            63: 'Rain',
            65: 'Heavy rain',
            66: 'Freezing rain',
            67: 'Heavy freezing rain',
            71: 'Slight snow',
            73: 'Snow',
            75: 'Heavy snow',
            77: 'Snow grains',
            80: 'Rain showers',
            81: 'Heavy rain showers',
            82: 'Violent rain showers',
            85: 'Snow showers',
            86: 'Heavy snow showers',
            95: 'Thunderstorm',
            96: 'Thunderstorm with hail',
            99: 'Strong thunderstorm with hail'
        };

        function iconForCode(code) {
            if (code === 0 || code === 1) {
                return '☀️';
            }
            if (code === 2 || code === 3) {
                return '☁️';
            }
            if (code === 45 || code === 48) {
                return '🌫️';
            }
            if ((code >= 51 && code <= 57) || (code >= 61 && code <= 67) || (code >= 80 && code <= 82)) {
                return '🌧️';
            }
            if ((code >= 71 && code <= 77) || code === 85 || code === 86) {
                return '❄️';
            }
            if (code === 95 || code === 96 || code === 99) {
                return '⛈️';
            }
            return '🌡️';
        }

        let cityIndex = 0;
        const cache = new Map();

        function endpointForCity(city) {
            return 'https://api.open-meteo.com/v1/forecast'
                + '?latitude=' + city.lat
                + '&longitude=' + city.lon
                + '&current=temperature_2m,weather_code'
                + '&daily=temperature_2m_max,temperature_2m_min,weather_code'
                + '&timezone=auto&forecast_days=2';
        }

        function renderWeather(city, data) {
            const currentTemp = data.current && data.current.temperature_2m;
            const currentCode = data.current && data.current.weather_code;
            const currentText = weatherCodes[currentCode] || 'Unknown';

            const tomorrowMax = data.daily && data.daily.temperature_2m_max && data.daily.temperature_2m_max[1];
            const tomorrowMin = data.daily && data.daily.temperature_2m_min && data.daily.temperature_2m_min[1];
            const tomorrowCode = data.daily && data.daily.weather_code && data.daily.weather_code[1];
            const tomorrowText = weatherCodes[tomorrowCode] || 'Unknown';

            cityElement.textContent = city.name;
            currentIconElement.textContent = iconForCode(currentCode);
            tomorrowIconElement.textContent = iconForCode(tomorrowCode);
            currentElement.textContent = 'Now: ' + currentTemp + '°C, ' + currentText;
            tomorrowElement.textContent = 'Tomorrow: ' + tomorrowMin + '°C / ' + tomorrowMax + '°C, ' + tomorrowText;
        }

        function renderError(city) {
            cityElement.textContent = city.name;
            currentIconElement.textContent = '⚠️';
            tomorrowIconElement.textContent = '⚠️';
            currentElement.textContent = 'Weather data is currently unavailable.';
            tomorrowElement.textContent = 'Please try again later.';
        }

        function showCityWeather() {
            const city = cities[cityIndex];
            const cacheKey = city.name;

            if (cache.has(cacheKey)) {
                renderWeather(city, cache.get(cacheKey));
            } else {
                fetch(endpointForCity(city))
                    .then(function (response) {
                        if (!response.ok) {
                            throw new Error('Weather request failed');
                        }
                        return response.json();
                    })
                    .then(function (data) {
                        cache.set(cacheKey, data);
                        renderWeather(city, data);
                    })
                    .catch(function () {
                        renderError(city);
                    });
            }

            cityIndex = (cityIndex + 1) % cities.length;
        }

        showCityWeather();
        setInterval(showCityWeather, 8000);
    })();
</script>
