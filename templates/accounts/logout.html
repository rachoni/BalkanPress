{% extends 'common/base.html' %}

{% block title %}Logout - BalkanPress{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-6">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 mb-0">Logout</h1>
                <a href="{% url 'accounts:profile' %}" class="btn btn-outline-secondary btn-sm">Back to Profile</a>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <p class="mb-4">Are you sure you want to log out?</p>

                    <form method="post" novalidate>
                        {% csrf_token %}

                        <div class="form-check mb-3">
                            {{ form.confirm }}
                            <label class="form-check-label" for="{{ form.confirm.id_for_label }}">
                                I want to log out.
                            </label>
                            {% for error in form.confirm.errors %}
                                <div class="text-danger small">{{ error }}</div>
                            {% endfor %}
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-danger">Logout</button>
                            <a href="{% url 'accounts:profile' %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
