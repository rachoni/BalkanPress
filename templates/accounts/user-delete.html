{% extends 'common/base.html' %}

{% block title %}Delete User - BalkanPress{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-6">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 mb-0">Delete User</h1>
                <a href="{% url 'accounts:user-list' %}" class="btn btn-outline-secondary btn-sm">Back to Users</a>
            </div>

            <div class="alert alert-warning">
                You are about to delete <strong>{{ object.username }}</strong>. This action cannot be undone.
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-danger">Delete User</button>
                            <a href="{% url 'accounts:user-list' %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
